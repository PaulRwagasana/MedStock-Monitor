name: Node.js CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Node.js Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies 
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json yet — skipping install."
          fi

      - name: Run tests (if a test script exists)
        run: |
          if [ -f package.json ]; then
            npm test --if-present
          fi
