version: "3.8"

services:
  backend:
    build:
      context: ./backend
    container_name: medstock-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - medstock-network

  postgres:
    image: postgres:15
    container_name: medstock-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medstock-network

volumes:
  postgres_data:

networks:
  medstock-network:
    driver: bridge
